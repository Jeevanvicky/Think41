<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Login - Sri Krishna Hardware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-form-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 450px;
            width: 100%;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #06ffa5;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(6, 255, 165, 0.25);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .retailer-info {
            background: rgba(6, 255, 165, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="login-container">
        <div class="login-form-card">
            <div class="text-center mb-4">
                <i class="fas fa-store login-icon"></i>
                <h2 class="text-white mb-3">Retailer Portal</h2>
                <p class="text-white-50">Access wholesale pricing and inventory</p>
            </div>
            
            <div class="retailer-info">
                <small class="text-white-50">
                    <i class="fas fa-info-circle me-2"></i>
                    New retailers can apply for access by contacting us directly.
                </small>
            </div>
            
            <form>
                <div class="mb-3">
                    <label for="retailer-id" class="form-label text-white">Retailer ID</label>
                    <input type="text" class="form-control" id="retailer-id" placeholder="Enter your retailer ID">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-white">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password">
                </div>
                
                <button type="submit" class="login-btn w-100 mb-3">Access Portal</button>
                
                <div class="text-center mb-3">
                    <div class="row text-center">
                        <div class="col-6">
                            <a href="#" class="text-white-50 text-decoration-none small">
                                <i class="fas fa-phone me-1"></i>Contact for Access
                            </a>
                        </div>
                        <div class="col-6">
                            <a href="#" class="text-white-50 text-decoration-none small">
                                <i class="fas fa-file-alt me-1"></i>Price List
                            </a>
                        </div>
                    </div>
                </div>
                
                <div class="text-center">
                    <a href="../index.html" class="text-white-50 text-decoration-none">
                        <i class="fas fa-arrow-left me-2"></i>Back to Home
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
